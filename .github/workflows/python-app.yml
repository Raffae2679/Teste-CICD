name: Pipeline Profissional Completo

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -------------------------------------------------------------
  # JOB 1: QUALIDADE E SEGURANÇA (CI)
  # -------------------------------------------------------------
  integracao-continua:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonando o código
        uses: actions/checkout@v4

      - name: 2. Configurando o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Ajuste para a versão que você usa

      - name: 3. Instalando ferramentas do pipeline
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 bandit

      - name: 4. Padronização de Código (Black)
        run: black --check .

      - name: 5. Qualidade e Sintaxe (Flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 6. Varredura de Segurança (Bandit)
        run: bandit -r . -c "bandit.yml" || bandit -r .

      - name: 7. Executando Testes
        run: |
          python arquivo.py 

  # -------------------------------------------------------------
  # JOB 2: DEPLOY CONTÍNUO (CD)
  # -------------------------------------------------------------
  deploy-servidores-fisicos: # <--- AGORA ESTÁ ALINHADO CORRETAMENTE AQUI!
    needs: integracao-continua 
    runs-on: self-hosted 
    if: github.event_name == 'push' 

    steps:
      - name: Identificando a Branch e Configurando a Pasta Local
        id: config
        shell: bash # <--- ADICIONE ESTA LINHA AQUI
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "BRANCH=main" >> $GITHUB_ENV
            echo "PATH_LOCAL=C:/meu_projeto_main" >> $GITHUB_ENV # <-- Use barra normal /
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "BRANCH=dev" >> $GITHUB_ENV
            echo "PATH_LOCAL=C:/meu_projeto_dev" >> $GITHUB_ENV # <-- Use barra normal /
          fi

      - name: Atualizando os arquivos no PC
        shell: bash # <--- ADICIONE ESTA LINHA AQUI TAMBÉM
        run: |
          cd ${{ env.PATH_LOCAL }}
          git fetch origin
          git reset --hard origin/${{ env.BRANCH }}
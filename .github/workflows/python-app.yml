name: Pipeline Profissional Completo

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -------------------------------------------------------------
  # JOB 1: QUALIDADE E SEGURANÇA (CI)
  # -------------------------------------------------------------
  integracao-continua:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonando o código
        uses: actions/checkout@v4

      - name: 2. Configurando o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Ajuste para a versão que você usa

      - name: 3. Instalando ferramentas do pipeline
        # Aqui instalamos os "fiscais" antes de rodar o código
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 bandit
          # Quando tiver um projeto real, descomente a linha abaixo:
          # pip install -r requirements.txt

      - name: 4. Padronização de Código (Black)
        # O argumento --check faz o pipeline falhar se o código estiver fora do padrão
        run: black --check .

      - name: 5. Qualidade e Sintaxe (Flake8)
        # Procura por variáveis não usadas ou erros lógicos de sintaxe
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 6. Varredura de Segurança (Bandit)
        # Procura falhas como senhas expostas no código ou injeção de comandos
        run: bandit -r . -c "bandit.yml" || bandit -r .

      - name: 7. Executando Testes
        # Se os fiscais acima aprovarem, finalmente rodamos o seu script/testes
        run: |
          python arquivo.py 
          # No seu projeto web oficial, o comando seria parecido com:
          # python manage.py test

deploy-servidores-fisicos:
    needs: integracao-continua 
    runs-on: self-hosted # O GitHub agora vai procurar o seu PC
    if: github.event_name == 'push' 

    steps:
      - name: Identificando a Branch e Configurando a Pasta Local
        id: config
        # Esse passo define qual pasta no seu PC vai ser atualizada
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "BRANCH=main" >> $GITHUB_ENV
            echo "PATH_LOCAL=C:\meu_projeto_main" >> $GITHUB_ENV 
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "BRANCH=dev" >> $GITHUB_ENV
            echo "PATH_LOCAL=C:\meu_projeto_dev" >> $GITHUB_ENV
          fi
        # Nota: Se você usar Linux, mude o PATH_LOCAL para ~/meu_projeto_main

      - name: Atualizando os arquivos no PC
        # O runner entra na pasta e puxa as novidades do repositório
        run: |
          cd ${{ env.PATH_LOCAL }}
          git fetch origin